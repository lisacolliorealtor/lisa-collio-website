# Netlify configuration — lisacolliorealtor.com
# Static site, self-hosted everything: no third-party scripts, fonts, or embeds
# (the approved Privacy Policy promises no client-side tracking).

[build]
  publish = "."

# Community pages renamed July 2026 (Batch 2f): permanent redirects from the
# old /communities/ paths. These must stay ABOVE the /* 404 rule (first match wins).
[[redirects]]
  from = "/communities/goshen/"
  to = "/living-in-goshen/"
  status = 301

[[redirects]]
  from = "/communities/elkhart/"
  to = "/living-in-elkhart/"
  status = 301

# Spanish Goshen community page renamed July 2026 (Batch 2e), same pattern.
[[redirects]]
  from = "/es/comunidades/goshen/"
  to = "/es/viviendo-en-goshen/"
  status = 301

# Custom 404 (bilingual wayfinding page).
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Self-hosted everything: no external script/style/font/img/connect sources.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"

# Long-cache immutable assets (fonts, images, CSS are content-addressed by path).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Standard caching for HTML (always revalidate so content updates land immediately).
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
